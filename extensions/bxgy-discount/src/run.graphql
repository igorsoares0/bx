query RunInput {
  cart {
    lines {
      id
      quantity
      bundleType: attribute(key: "_bxapp_bundle_type") {
        value
      }
      bundleId: attribute(key: "_bxapp_bundle_id") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discountNode {
    metafield(namespace: "$app:bxgy-discount", key: "function-configuration") {
      value
    }
  }
}
